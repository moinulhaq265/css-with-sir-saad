<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .Contact{
        display: grid;
        place-content: center;
        width: 100vw;
        height: 100vh;
        /* background-color: red; */
        /* margin: 80px 7%; */
    }
    .container{
        width: 500px;
        height: 550px;
        background-color: #0b0f19;
        border: 2px solid #38BDF8;
        border-radius: 15px;
        /* background-color: green; */
        /* margin-top: 60px; */
        /* align-items: center; */
        place-content: center;
    }
    .container h1{
        text-align: center;
        padding-bottom: 30px;
        color: #fff;
    }
    .container h1 span{
        color: #38BDF8;
    }
    .form-container{
        /* display: flex;
        justify-content: center; */
        /* width: 500px;
        height: 550px; */
        align-items: center;
        text-align: center;
        padding: 15px 5px;
    }
    .form-container input{
        width: 100%;
        height: 50px;
        border: none;
        outline: none;
        padding: 0 10px;
        /* padding-right: 30px; */
    }
    .form-container textarea{
        width: 100%;
        height: 120px;
        padding: 5px 10px;
        border: none;
        outline: none;
    }
    #form-btn{
        width: 70px;
        height: 30px;
        border: none;
        border-radius: 15px;
        background-color: #38BDF8;
        font-weight: bold;
        /* padding-left: 5px; */
    }
    #form-btn:hover{
        box-shadow: 0 8px 20px #38BDF8;
        color: #bbb300;
        transform: translateY(-3px);
        background-color: cadetblue;
    }
    
</style>
<body>
    <section id="Contact" class="Contact">
        <div class="container">
            <h1>Con<span>tact</span></h1>
            <form action="">
                <div class="form-container">
                    <input type="text" placeholder="Enter your Name">
                </div>
                <div class="form-container">
                    <input type="email" placeholder="Enter Your E-mail">
                </div>
                <div class="form-container">
                    <textarea cols="0" rows="4" placeholder="Write A Massage"></textarea>
                </div>
                <input id="form-btn" type="submit" value="Send">
            </form>
        </div>
    </section>
</body>
</html>
